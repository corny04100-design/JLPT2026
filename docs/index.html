        /* 스크롤바 디자인 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-12">

    <!-- 상단 헤더 -->

        </div>
    </header>
    <div id="installBox" class="hidden max-w-4xl mx-auto px-4 mb-5">
    <button id="installBtn"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold shadow-lg transition">
        📲 앱 설치하기

</div>

        <!-- 사용 안내 배너 -->
        <div class="bg-amber-50 border-l-4 border-amber-500 p-4 mb-6 rounded-r-lg shadow-sm">
            <div class="flex">
                <div class="flex-shrink-0">
                    <svg class="h-5 w-5 text-amber-500" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                    </svg>
                </div>
                <div class="ml-3 text-sm text-amber-800">
                    <p class="font-bold mb-1">안내사항</p>
                    <ul class="list-disc list-inside space-y-0.5 text-xs md:text-sm">
                        <li>실제 JLPT는 득점등화 방식으로 채점되므로 본 계산기는 <strong>간이 채점용</strong>입니다!</li>
                        <li>맞춘 개수를 <strong>[정답]</strong> 칸에 입력하시면 실시간으로 점수가 계산됩니다.</li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- 급수 탭 버튼 -->
        <div class="flex space-x-1 md:space-x-2 border-b border-slate-300 mb-6 overflow-x-auto pb-1">
            <button onclick="switchTab('N1')" id="tab-N1" class="tab-btn flex-1 py-2.5 px-4 font-bold text-center rounded-t-lg transition-colors border-t-2 border-transparent bg-indigo-600 text-white shadow-sm">N1</button>
            <button onclick="switchTab('N2')" id="tab-N2" class="tab-btn flex-1 py-2.5 px-4 font-bold text-center rounded-t-lg transition-colors border-t-2 border-transparent bg-slate-200 text-slate-600 hover:bg-slate-300">N2</button>

            renderLevel(level);
            calculateScore();
        }

        <td class="py-2.5 px-3 font-medium text-slate-800">${prob.title}</td>
        <td class="py-2.5 px-3 text-center text-xs text-slate-400">${prob.range}</td>
        <td class="py-2.5 px-3 text-center font-semibold text-amber-600">${prob.weight}</td>
        <td class="py-2.5 px-3 text-center">
            <!-- readonly 속성을 추가하고 배경색을 회색조로 변경하여 수정 불가 표시 -->
            <input type="number" value="${prob.qCount}" 
                   id="q-${sIdx}-${pIdx}" 
                   readonly
                   class="w-16 p-1 text-center font-bold bg-slate-100 border border-slate-200 rounded text-slate-500 cursor-not-allowed">
        </td>
        <td class="py-2.5 px-3 text-center">
            <input type="number" min="0" max="${prob.qCount}" value="" placeholder="0" 
                   id="a-${sIdx}-${pIdx}" 
                   oninput="validateInput(${sIdx}, ${pIdx}); calculateScore();"
                   class="w-16 p-1 text-center font-bold bg-white border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500 text-indigo-600">

                                    희망적 채점결과
                                </span>
                                <span class="text-xs bg-emerald-800/60 px-2.5 py-1 rounded-full text-emerald-100"></span>
                            </div>
                            <div class="space-y-2 text-sm mb-4" id="green-sections"></div>
                            <div class="border-t border-emerald-500/50 pt-3 flex justify-between items-end">
                                <div>
                                    <div class="text-xs text-emerald-200">예상 총점 (합격기준 ${data.passScore}점)</div>
                                    <div class="text-3xl font-black tracking-tight" id="green-total">0 / 180</div>
                                </div>
                                <div id="green-status" class="text-lg font-bold px-3 py-1 rounded bg-black/20">-</div>
                            </div>
                        </div>

                        <!-- 파랭이 결과카드 -->
                        <div class="bg-gradient-to-br from-blue-600 to-indigo-700 text-white rounded-xl shadow-md p-5">
                            <div class="flex justify-between items-center border-b border-blue-500/50 pb-3 mb-4">
                                <span class="font-extrabold text-lg flex items-center">
                                    <span class="w-2.5 h-2.5 bg-blue-300 rounded-full mr-2 animate-pulse"></span>
                                    보수적 채점결과
                                </span>
                                <span class="text-xs bg-blue-800/60 px-2.5 py-1 rounded-full text-blue-100"></span>
                            </div>
                            <div class="space-y-2 text-sm mb-4" id="blue-sections"></div>
                            <div class="border-t border-blue-500/50 pt-3 flex justify-between items-end">
                                <div>
                                    <div class="text-xs text-blue-200">예상 총점 (합격기준 ${data.passScore}점)</div>
                                    <div class="text-3xl font-black tracking-tight" id="blue-total">0 / 180</div>
                                </div>
                                <div id="blue-status" class="text-lg font-bold px-3 py-1 rounded bg-black/20">-</div>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                // N4, N5
                resultCardHtml = `
                    <div class="max-w-md mx-auto mt-8">
                        <div class="bg-gradient-to-br from-emerald-600 to-teal-700 text-white rounded-xl shadow-md p-5">
                            <div class="flex justify-between items-center border-b border-emerald-500/50 pb-3 mb-4">
                                <span class="font-extrabold text-lg flex items-center">
                                    <span class="w-2.5 h-2.5 bg-emerald-300 rounded-full mr-2 animate-pulse"></span>
                                    가채점 결과
                                </span>
                                <span class="text-xs bg-emerald-800/60 px-2.5 py-1 rounded-full text-emerald-100"></span>
                            </div>
                            <div class="space-y-2 text-sm mb-4" id="green-sections"></div>
                            <div class="border-t border-emerald-500/50 pt-3 flex justify-between items-end">
                                <div>
                                    <div class="text-xs text-emerald-200">예상 총점 (합격기준 ${data.passScore}점)</div>
                                    <div class="text-3xl font-black tracking-tight" id="green-total">0 / 180</div>
                                </div>
                                <div id="green-status" class="text-lg font-bold px-3 py-1 rounded bg-black/20">-</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            // 초기화 버튼 추가
            const btnHtml = `
                <div class="flex justify-center mt-6">
                    <button onclick="resetInputs()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold py-2 px-6 rounded-lg shadow-sm transition-colors text-sm flex items-center space-x-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        <span>현재 급수 입력값 초기화</span>
                    </button>
                </div>
            `;

            container.innerHTML += resultCardHtml + btnHtml;
        }

        // 입력값 검증 (정답수가 문항수를 초과하지 않도록)
        function validateInput(sIdx, pIdx) {
            const qInput = document.getElementById(`q-${sIdx}-${pIdx}`);
            const aInput = document.getElementById(`a-${sIdx}-${pIdx}`);
            
            let qVal = parseInt(qInput.value) || 0;
            let aVal = parseInt(aInput.value) || 0;

            if (qVal < 1) { qVal = 1; qInput.value = 1; }
            if (aVal < 0) { aVal = 0; aInput.value = ""; }
            if (aVal > qVal) {
                aInput.value = qVal;
            }
        }

        // 초기화 버튼 동작
        function resetInputs() {
            if (!confirm("현재 입력한 정답수를 모두 초기화하시겠습니까?")) return;
            renderLevel(currentLevel);
            calculateScore();
        }

        // 점수 계산 및 렌더링 로직
        function calculateScore() {
            const data = jlptData[currentLevel];
            let greenTotal = 0;
            let blueTotal = 0;
            let greenPass = true;
            let bluePass = true;
            
            let greenSecHtml = '';
            let blueSecHtml = '';

            data.sections.forEach((sec, sIdx) => {
                let secQCount = 0;
                let secACount = 0;
                let secWeightedSum = 0;
                let secMaxWeightedSum = 0;

                sec.problems.forEach((prob, pIdx) => {
                    const qVal = parseInt(document.getElementById(`q-${sIdx}-${pIdx}`).value) || 0;
                    const aStr = document.getElementById(`a-${sIdx}-${pIdx}`).value;
                    const aVal = aStr === "" ? 0 : parseInt(aStr);

                    secQCount += qVal;
                    secACount += aVal;
                    secWeightedSum += (aVal * prob.weight);
                    secMaxWeightedSum += (qVal * prob.weight);
                });

                // --- 초록이 섹션 점수 계산 ---
                let gScore = 0;
                if (secMaxWeightedSum > 0) {
                    gScore = Math.round((secWeightedSum * sec.maxScore) / secMaxWeightedSum);
                }
                greenTotal += gScore;
                const gFail = gScore < sec.minPass;
                if (gFail) greenPass = false;

                greenSecHtml += `
                    <div class="flex justify-between items-center bg-white/10 px-3 py-1.5 rounded">
                        <span class="truncate pr-2">${sec.name}</span>
                        <div class="flex items-center space-x-2 flex-shrink-0">
                            <span class="font-bold">${gScore} / ${sec.maxScore}</span>
                            <span class="text-xs px-1.5 py-0.5 rounded font-extrabold ${gFail ? 'bg-red-500 text-white' : 'bg-white/20 text-emerald-100'}">${gFail ? '과락' : '통과'}</span>
                        </div>
                    </div>
                `;

                // --- 파랭이 섹션 점수 계산 (N1~N3만 해당) ---
                if (data.hasBlue) {
                    let bScore = 0;
                    if (secQCount > 0) {
                        if (secACount === secQCount) {
                            bScore = sec.maxScore; // 만점
                        } else {
                            const benchmark = data.blueBenchmarks[`sec${sIdx}`];
                            bScore = Math.round((benchmark * secACount) / secQCount);
                        }
                    }
                    blueTotal += bScore;
                    const bFail = bScore < sec.minPass;
                    if (bFail) bluePass = false;

                    blueSecHtml += `
                        <div class="flex justify-between items-center bg-white/10 px-3 py-1.5 rounded">
                            <span class="truncate pr-2">${sec.name}</span>
                            <div class="flex items-center space-x-2 flex-shrink-0">
                                <span class="font-bold">${bScore} / ${sec.maxScore}</span>
                                <span class="text-xs px-1.5 py-0.5 rounded font-extrabold ${bFail ? 'bg-red-500 text-white' : 'bg-white/20 text-blue-100'}">${bFail ? '과락' : '통과'}</span>
                            </div>
                        </div>
                    `;
                }
            });

            // 초록이 최종 출력
            document.getElementById('green-sections').innerHTML = greenSecHtml;
            document.getElementById('green-total').innerText = `${greenTotal} / 180`;
            const gStatusEl = document.getElementById('green-status');
            if (greenPass && greenTotal >= data.passScore) {
                gStatusEl.innerText = "합격";
                gStatusEl.className = "text-lg font-black px-3 py-1 rounded bg-white text-emerald-700 shadow";
            } else {
                gStatusEl.innerText = !greenPass ? "불합격 (과락)" : "불합격";
                gStatusEl.className = "text-lg font-black px-3 py-1 rounded bg-red-500 text-white shadow";
            }

            // 파랭이 최종 출력 (N1~N3)
            if (data.hasBlue) {
                document.getElementById('blue-sections').innerHTML = blueSecHtml;
                document.getElementById('blue-total').innerText = `${blueTotal} / 180`;
                const bStatusEl = document.getElementById('blue-status');
                if (bluePass && blueTotal >= data.passScore) {
                    bStatusEl.innerText = "합격";
                    bStatusEl.className = "text-lg font-black px-3 py-1 rounded bg-white text-blue-700 shadow";
                } else {
                    bStatusEl.innerText = !bluePass ? "불합격 (과락)" : "불합격";
                    bStatusEl.className = "text-lg font-black px-3 py-1 rounded bg-red-500 text-white shadow";
                }
            }
        }

        // 브라우저 로딩 완료 시 초기 실행 (기본값: N1 탭 렌더링)
        window.addEventListener('DOMContentLoaded', () => {
            switchTab('N1');
        });
    </script>
    
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
                .then(() => console.log('Service Worker 등록 완료'))
                .catch(err => console.error('Service Worker 등록 실패', err));
        });
    }
    </script>
    
</body>
</html>
